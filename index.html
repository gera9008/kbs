<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World Animation</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e90ff; /* Синій фон */
    }

    #hello {
      font-size: 3rem;
      color: white;
      opacity: 0; /* Початково невидимий */
      transition: opacity 2s ease-in-out; /* Плавна анімація прозорості */
    }
  </style>
</head>
<body>
  <div id="hello">Hello World</div>
  <script src="script.js"></script>
</body>
</html>
